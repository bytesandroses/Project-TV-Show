<!doctype html>
<html lang="en">

    <title>TV Show Project | Isaac Abodunrin (bytesandroses)</title>

    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />

    <script src="script.js" defer></script>

    <div class="controls">

    <div id="root"></div>
